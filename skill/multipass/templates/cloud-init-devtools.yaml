#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - build-essential
  - curl
  - wget
  - unzip
  - jq
  - python3
  - python3-pip
  - python3-venv

runcmd:
  # Install nvm for ubuntu user
  - su - ubuntu -c "curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash"
  # Install Node LTS via nvm
  - su - ubuntu -c "export NVM_DIR=\"\$HOME/.nvm\" && [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\" && nvm install --lts"
  # Signal completion
  - touch /var/run/cloud-init-complete
